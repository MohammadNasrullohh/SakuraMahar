<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sakura Mahar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=DynaPuff:wght@400..700&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/png" href="assets/brand-symbol-transparent.png" />
    <link rel="apple-touch-icon" href="assets/brand-symbol-transparent.png" />
    <link rel="stylesheet" href="styles.css?v=18" />
  </head>
  <body>
    <header class="site-header" id="top">
      <a class="brand" href="#home" data-route="home" aria-label="Sakura Mahar beranda">
        <span>Sakura</span>
        <strong>Mahar</strong>
      </a>

      <button class="nav-toggle" type="button" aria-label="Buka menu" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <nav class="site-nav" aria-label="Navigasi utama">
        <a href="#home" data-route="home">Beranda</a>
        <a href="#catalog" data-route="catalog">Katalog</a>
        <a href="#about" data-route="about">Tentang Kami</a>
      </nav>

      <div class="header-tools">
        <label class="search-box" aria-label="Cari produk">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M10.5 18a7.5 7.5 0 1 1 5.3-2.2l3.7 3.7-1.4 1.4-3.7-3.7A7.4 7.4 0 0 1 10.5 18Zm0-2a5.5 5.5 0 1 0 0-11 5.5 5.5 0 0 0 0 11Z" />
          </svg>
          <input id="siteSearch" type="search" placeholder="Cari Produk" autocomplete="off" />
        </label>

        <button class="icon-button" type="button" data-route="catalog" aria-label="Wishlist">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 21s-7.5-4.6-9.4-9.3C1.3 8.4 3.2 5 6.7 5c2 0 3.4 1 4.2 2.2C11.7 6 13.1 5 15.1 5c3.5 0 5.4 3.4 4.1 6.7C17.5 16.4 12 21 12 21Zm0-2.4c2-1.4 4.7-4 5.5-7.6.8-2.1-.2-4-2.4-4-1.7 0-2.7 1-3.2 2.6h-1.8C9.7 8 8.6 7 6.9 7c-2.2 0-3.3 1.9-2.4 4 1 3.3 4.2 6.2 7.5 7.6Z" />
          </svg>
        </button>

        <button class="icon-button cart-button" type="button" data-route="checkout" aria-label="Keranjang">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M7 22a2 2 0 1 1 0-4 2 2 0 0 1 0 4Zm10 0a2 2 0 1 1 0-4 2 2 0 0 1 0 4ZM4.1 4H2V2h3.6l1.2 3h13.7l-2 8.2a3 3 0 0 1-2.9 2.3H8.1A3 3 0 0 1 5.2 13L4.1 4Zm3.4 3 1.4 5.5a1 1 0 0 0 1 .8h5.7a1 1 0 0 0 1-.8L17.9 7H7.5Z" />
          </svg>
          <span id="cartCount">0</span>
        </button>

        <button class="account-chip" type="button" data-route="login" aria-label="Masuk akun">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Zm0 2c-4.4 0-8 2.2-8 5v1h16v-1c0-2.8-3.6-5-8-5Z" />
          </svg>
          <span>Masuk</span>
        </button>
      </div>
    </header>

    <main id="app" tabindex="-1"></main>



    <footer class="site-footer">
      <div>
        <a class="footer-brand" href="#home" data-route="home">
          <img src="assets/brand-symbol-transparent.png" alt="" />
          <span>Sakura Mahar</span>
        </a>
        <p>
          Toko mahar custom yang fokus pada bingkai mahar, hantaran, seserahan, dan
          packing wajib dengan proses order yang rapi.
        </p>
      </div>
      <div>
        <h2>Jelajahi</h2>
        <a href="#home" data-route="home">Beranda</a>
        <a href="#catalog" data-route="catalog">Katalog</a>
        <a href="#about" data-route="about">Tentang Kami</a>
        <a href="#login" data-route="login">Chat</a>
        <a href="#catalog" data-route="catalog">Cari Produk</a>
      </div>
      <div>
        <h2>Hubungi</h2>
        <div class="social-row" id="footerSocialRow" aria-label="Media sosial">
        </div>
      </div>
      <p class="copyright">&copy; 2026 Sakura Mahar. Semua Hak Dilindungi.</p>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="script.js?v=18"></script>
  </body>
</html>
